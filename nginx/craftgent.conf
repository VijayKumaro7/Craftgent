# CraftAgent Nginx Configuration
# Reverse proxy for FastAPI backend + React frontend

# Upstream backends
upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

# HTTP redirect to HTTPS (in production)
server {
    listen 80;
    server_name _;

    # Allow certbot for HTTPS setup
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (should be mounted from volumes)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_comp_level 6;

    # Client body size limit
    client_max_body_size 10M;

    # ─────────────────────────────────────────────────────────────────────────
    # API Routes
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        # Proxy settings
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cookies
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure httponly samesite=lax;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Health check endpoint
    # ─────────────────────────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Frontend Static Files & SPA
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        limit_req zone=general_limit burst=100 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA routing - send all requests to index.html
        # Except for actual files with extensions
        if (!-f $request_filename) {
            rewrite ^(.*)$ /index.html last;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Caching for static assets
    # ─────────────────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Deny access to sensitive files
    # ─────────────────────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/craftgent_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/craftgent_error.log warn;
}

# Fallback for non-HTTPS, non-matching requests
server {
    listen 80 default_server;
    server_name _;
    location / {
        return 404;
    }
}
