# Netlify configuration for Craftgent
# https://docs.netlify.com/configure-builds/file-conventions/
#
# IMPORTANT: Required Environment Variables
# Set these in Netlify UI (Site settings → Build & deploy → Environment)
#   VITE_API_URL: Backend API endpoint (e.g., https://api.yourdomain.com or https://backend.netlify.app)
#   VITE_WS_URL: WebSocket endpoint (e.g., wss://api.yourdomain.com - note: wss for HTTPS)
#
# Without these variables, the frontend will fail to connect to the backend.

[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/dist"
  base = "/"

[build.environment]
  NODE_VERSION = "18.19.0"

# Rewrite all non-file requests to index.html for React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for all requests
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Access-Control-Allow-Origin = "*"

# Cache static assets (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache versioned JS/CSS files
[[headers]]
  for = "/index*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML (always fetch fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

