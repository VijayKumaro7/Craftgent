<svg width="1200" height="850" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">File Upload Workflow - Step by Step</text>

  <!-- Step 1: Upload Area -->
  <g>
    <rect x="50" y="80" width="260" height="280" fill="#fff" stroke="#3498db" stroke-width="2" rx="8"/>
    <text x="180" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#2980b9">Step 1: Select File</text>

    <rect x="70" y="135" width="220" height="180" fill="#f0f8ff" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" rx="4"/>
    <text x="180" y="215" font-size="32" text-anchor="middle" fill="#3498db">📁</text>
    <text x="180" y="250" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">Drag & Drop File</text>
    <text x="180" y="270" font-size="10" text-anchor="middle" fill="#666">or</text>
    <text x="180" y="290" font-size="11" text-anchor="middle" fill="#3498db" text-decoration="underline">Click to Browse</text>

    <text x="70" y="335" font-size="9" fill="#999">Supported: PDF, CSV, TXT, JSON, DOC, XLS</text>
    <text x="70" y="350" font-size="9" fill="#999">Max size: 50MB</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 330 220 L 380 220" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowgreen)"/>
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Step 2: File Processing -->
  <g>
    <rect x="400" y="80" width="260" height="280" fill="#fff" stroke="#f39c12" stroke-width="2" rx="8"/>
    <text x="530" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#d68910">Step 2: Processing</text>

    <rect x="420" y="140" width="220" height="70" fill="#fff9e6" stroke="#f39c12" stroke-width="1" rx="4"/>
    <text x="530" y="165" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">my-data.csv</text>
    <text x="530" y="183" font-size="10" text-anchor="middle" fill="#666">2.4 MB • Uploading...</text>

    <!-- Progress Bar -->
    <rect x="420" y="225" width="220" height="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <rect x="420" y="225" width="165" height="15" fill="#f39c12" stroke="#d68910" stroke-width="1" rx="3"/>
    <text x="650" y="237" font-size="10" fill="#333" font-weight="bold">75%</text>

    <text x="420" y="265" font-size="10" fill="#666">• Validating file format</text>
    <text x="420" y="283" font-size="10" fill="#666">• Analyzing content</text>
    <text x="420" y="301" font-size="10" fill="#666">• Preparing for AI processing</text>

    <text x="420" y="335" font-size="9" fill="#999">Estimated time: 15-30 seconds</text>
    <text x="420" y="350" font-size="9" fill="#999">Large files may take longer</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 680 220 L 730 220" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Step 3: Analysis Complete -->
  <g>
    <rect x="750" y="80" width="260" height="280" fill="#fff" stroke="#27ae60" stroke-width="2" rx="8"/>
    <text x="880" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#229954">Step 3: Ready to Use</text>

    <rect x="770" y="140" width="220" height="70" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" rx="4"/>
    <text x="880" y="165" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">✓ my-data.csv</text>
    <text x="880" y="183" font-size="10" text-anchor="middle" fill="#666">Successfully processed</text>

    <rect x="770" y="225" width="220" height="50" fill="#fff" stroke="#27ae60" stroke-width="1" rx="4"/>
    <text x="780" y="245" font-size="11" fill="#333" font-weight="bold">File Details:</text>
    <text x="780" y="263" font-size="10" fill="#666">Rows: 1,250 • Columns: 8</text>

    <text x="770" y="300" font-size="10" fill="#666">✓ File is now available in chat</text>
    <text x="770" y="318" font-size="10" fill="#666">✓ Ask agents to analyze it</text>
    <text x="770" y="336" font-size="10" fill="#666">✓ Generate insights & summaries</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 1020 220 L 1070 220" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowgreen)"/>

  <!-- Step 4: Chat Integration -->
  <g>
    <rect x="1080" y="80" width="120" height="280" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="8"/>
    <text x="1140" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#c0392b">Step 4: Use</text>

    <text x="1140" y="145" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Ask agents</text>
    <text x="1140" y="163" font-size="9" text-anchor="middle" fill="#666" font-style="italic">to analyze</text>
    <text x="1140" y="181" font-size="9" text-anchor="middle" fill="#666" font-style="italic">your file</text>

    <text x="1100" y="215" font-size="9" fill="#666">E.g.:</text>
    <text x="1100" y="230" font-size="8" fill="#555" font-family="monospace">"Summarize</text>
    <text x="1100" y="241" font-size="8" fill="#555" font-family="monospace">this data"</text>

    <text x="1140" y="280" font-size="28" text-anchor="middle" fill="#e74c3c">💬</text>
  </g>

  <!-- Detailed Process Flow -->
  <rect x="50" y="390" width="1150" height="420" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="8"/>
  <text x="60" y="415" font-size="13" font-weight="bold" fill="#333">Detailed Processing Steps</text>

  <!-- Column 1: File Types -->
  <rect x="60" y="440" width="270" height="350" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="4"/>
  <text x="70" y="465" font-size="12" font-weight="bold" fill="#333">📄 Supported File Types</text>
  <line x1="70" y1="475" x2="320" y2="475" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="500" font-size="11" fill="#333"><tspan font-weight="bold">Documents:</tspan></text>
  <text x="80" y="518" font-size="10" fill="#666">• PDF (.pdf)</text>
  <text x="80" y="533" font-size="10" fill="#666">• Word (.docx, .doc)</text>
  <text x="80" y="548" font-size="10" fill="#666">• Text (.txt)</text>

  <text x="70" y="575" font-size="11" fill="#333"><tspan font-weight="bold">Data:</tspan></text>
  <text x="80" y="593" font-size="10" fill="#666">• CSV (.csv)</text>
  <text x="80" y="608" font-size="10" fill="#666">• Excel (.xlsx, .xls)</text>
  <text x="80" y="623" font-size="10" fill="#666">• JSON (.json)</text>

  <text x="70" y="650" font-size="11" fill="#333"><tspan font-weight="bold">Max Size:</tspan></text>
  <text x="80" y="668" font-size="10" fill="#666">50 MB per file</text>
  <text x="70" y="690" font-size="10" fill="#999">Files larger than 50MB will</text>
  <text x="70" y="705" font-size="10" fill="#999">be rejected for security</text>

  <!-- Column 2: Processing -->
  <rect x="350" y="440" width="270" height="350" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="4"/>
  <text x="360" y="465" font-size="12" font-weight="bold" fill="#333">⚙️ What Happens During Upload</text>
  <line x1="360" y1="475" x2="610" y2="475" stroke="#bdc3c7" stroke-width="1"/>

  <text x="360" y="500" font-size="10" fill="#333"><tspan font-weight="bold">1. Validation</tspan></text>
  <text x="370" y="518" font-size="9" fill="#666">File type & size checked</text>
  <text x="370" y="530" font-size="9" fill="#666">Malware scan performed</text>

  <text x="360" y="555" font-size="10" fill="#333"><tspan font-weight="bold">2. Extraction</tspan></text>
  <text x="370" y="573" font-size="9" fill="#666">Content parsed & indexed</text>
  <text x="370" y="585" font-size="9" fill="#666">Metadata extracted</text>

  <text x="360" y="610" font-size="10" fill="#333"><tspan font-weight="bold">3. Embedding</tspan></text>
  <text x="370" y="628" font-size="9" fill="#666">Content vectorized for AI</text>
  <text x="370" y="640" font-size="9" fill="#666">Stored in memory database</text>

  <text x="360" y="665" font-size="10" fill="#333"><tspan font-weight="bold">4. Ready</tspan></text>
  <text x="370" y="683" font-size="9" fill="#666">Available in current session</text>
  <text x="370" y="695" font-size="9" fill="#666">Agents can analyze</text>

  <!-- Column 3: Capabilities -->
  <rect x="640" y="440" width="270" height="350" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="4"/>
  <text x="650" y="465" font-size="12" font-weight="bold" fill="#333">🔧 What AI Agents Can Do</text>
  <line x1="650" y1="475" x2="900" y2="475" stroke="#bdc3c7" stroke-width="1"/>

  <text x="650" y="500" font-size="10" fill="#333"><tspan font-weight="bold">Document Analysis</tspan></text>
  <text x="660" y="518" font-size="9" fill="#666">✓ Summarize content</text>
  <text x="660" y="530" font-size="9" fill="#666">✓ Extract key points</text>
  <text x="660" y="542" font-size="9" fill="#666">✓ Answer questions</text>

  <text x="650" y="567" font-size="10" fill="#333"><tspan font-weight="bold">Data Analysis</tspan></text>
  <text x="660" y="585" font-size="9" fill="#666">✓ Statistical analysis</text>
  <text x="660" y="597" font-size="9" fill="#666">✓ Trend detection</text>
  <text x="660" y="609" font-size="9" fill="#666">✓ Generate charts</text>

  <text x="650" y="634" font-size="10" fill="#333"><tspan font-weight="bold">Code Processing</tspan></text>
  <text x="660" y="652" font-size="9" fill="#666">✓ Debug code</text>
  <text x="660" y="664" font-size="9" fill="#666">✓ Suggest improvements</text>
  <text x="660" y="676" font-size="9" fill="#666">✓ Generate tests</text>

  <!-- Column 4: Best Practices -->
  <rect x="930" y="440" width="260" height="350" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="4"/>
  <text x="940" y="465" font-size="12" font-weight="bold" fill="#333">💡 Best Practices</text>
  <line x1="940" y1="475" x2="1180" y2="475" stroke="#bdc3c7" stroke-width="1"/>

  <text x="940" y="500" font-size="9" fill="#333"><tspan font-weight="bold">DO:</tspan></text>
  <text x="950" y="518" font-size="9" fill="#27ae60">✓ Use PDF for documents</text>
  <text x="950" y="530" font-size="9" fill="#27ae60">✓ Use CSV for data</text>
  <text x="950" y="542" font-size="9" fill="#27ae60">✓ Be specific in questions</text>
  <text x="950" y="554" font-size="9" fill="#27ae60">✓ Upload one topic at a time</text>

  <text x="940" y="580" font-size="9" fill="#333"><tspan font-weight="bold">DON'T:</tspan></text>
  <text x="950" y="598" font-size="9" fill="#e74c3c">✗ Upload personal documents</text>
  <text x="950" y="610" font-size="9" fill="#e74c3c">✗ Use scanned images</text>
  <text x="950" y="622" font-size="9" fill="#e74c3c">✗ Upload encrypted files</text>
  <text x="950" y="634" font-size="9" fill="#e74c3c">✗ Files over 50MB</text>

  <text x="940" y="670" font-size="9" fill="#333"><tspan font-weight="bold">Tips:</tspan></text>
  <text x="950" y="688" font-size="8" fill="#666">Clean up data before</text>
  <text x="950" y="698" font-size="8" fill="#666">uploading for best results</text>
</svg>
