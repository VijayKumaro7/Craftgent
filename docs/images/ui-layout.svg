  <rect x="270" y="100" width="1150" height="80" fill="rgba(85, 255, 255, 0.1)" stroke="#55ffff" stroke-width="1" rx="4"/>
  <text x="280" y="115" font-family="monospace" font-size="9" fill="#55ffff">🤖 NEXUS</text>
  <text x="280" y="135" font-family="monospace" font-size="10" fill="#ffffff">Here's your research on machine learning foundations...</text>
  <text x="280" y="150" font-family="monospace" font-size="10" fill="#ffffff">The field combines statistics, computer science, and mathematics...</text>
  <text x="280" y="165" font-family="monospace" font-size="9" fill="#aaaaaa">10:30 AM</text>

  <!-- Message 2: ALEX -->
  <rect x="270" y="190" width="1150" height="100" fill="rgba(170, 255, 170, 0.1)" stroke="#aaffaa" stroke-width="1" rx="4"/>
  <text x="280" y="205" font-family="monospace" font-size="9" fill="#aaffaa">⚡ ALEX</text>
  <text x="280" y="225" font-family="monospace" font-size="10" fill="#ffffff">```python</text>
  <text x="280" y="240" font-family="monospace" font-size="9" fill="#90ee90">def hello():</text>
  <text x="290" y="255" font-family="monospace" font-size="9" fill="#90ee90">    return "world"</text>
  <text x="280" y="270" font-family="monospace" font-size="10" fill="#ffffff">```</text>
  <text x="280" y="285" font-family="monospace" font-size="9" fill="#aaaaaa">10:32 AM</text>

  <!-- Message 3: Typing Indicator -->
  <rect x="270" y="300" width="1150" height="50" fill="rgba(0,0,0,0.3)" stroke="#666" stroke-width="1" rx="4"/>
  <text x="280" y="320" font-family="monospace" font-size="10" fill="#f5c842">▶ VORTEX is thinking...</text>
  <circle cx="320" cy="333" r="3" fill="#f5c842"/>
  <circle cx="330" cy="333" r="3" fill="#f5c842"/>
  <circle cx="340" cy="333" r="3" fill="#f5c842"/>

  <!-- Input Bar -->
  <rect x="250" y="811" width="1190" height="40" fill="rgba(0,0,0,0.72)" stroke="#444" stroke-width="2" stroke-top="3px solid black"/>
  <line x1="250" y1="811" x2="1440" y2="811" stroke="#1a1a1a" stroke-width="3"/>

