  <text x="1315" y="835" font-family="monospace" font-size="10" font-weight="bold" fill="white">SEND ▶</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="gradientGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7acc40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3e6b1f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Legend -->
  <text x="260" y="890" font-family="monospace" font-size="8" fill="#666">Full UI Layout • Agents: NEXUS, ALEX, VORTEX, RESEARCHER • Session Tabs • Message Display • Input Bar</text>
