<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">Hotbar Controls - Quick Actions Guide</text>

  <!-- Minecraft-style Hotbar -->
  <rect x="100" y="80" width="1000" height="120" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="3" rx="8"/>
  <rect x="110" y="90" width="980" height="100" fill="#6a6a6a" stroke="#3a3a3a" stroke-width="2" rx="6"/>

  <!-- Individual Hotbar Slots -->
  <!-- Slot 1 -->
  <rect x="120" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="160" y="160" font-size="32" text-anchor="middle" fill="#fff">💬</text>
  <text x="160" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">Q - Chat</text>

  <!-- Slot 2 -->
  <rect x="220" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="260" y="160" font-size="32" text-anchor="middle" fill="#fff">📎</text>
  <text x="260" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">W - Files</text>

  <!-- Slot 3 -->
  <rect x="320" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="360" y="160" font-size="32" text-anchor="middle" fill="#fff">📋</text>
  <text x="360" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">E - Templates</text>

  <!-- Slot 4 (Highlighted) -->
  <rect x="420" y="100" width="80" height="80" fill="#f39c12" stroke="#d68910" stroke-width="3" rx="4"/>
  <rect x="425" y="105" width="70" height="70" fill="#ffc949" stroke="#f39c12" stroke-width="2" rx="3"/>
  <text x="460" y="160" font-size="32" text-anchor="middle" fill="#333">⚙️</text>
  <text x="460" y="190" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">R - Settings</text>

  <!-- Slot 5 -->
  <rect x="520" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="560" y="160" font-size="32" text-anchor="middle" fill="#fff">🎨</text>
  <text x="560" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">T - Theme</text>

  <!-- Slot 6 -->
  <rect x="620" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="660" y="160" font-size="32" text-anchor="middle" fill="#fff">🔦</text>
  <text x="660" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">Y - Light</text>

  <!-- Slot 7 -->
  <rect x="720" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="760" y="160" font-size="32" text-anchor="middle" fill="#fff">💾</text>
  <text x="760" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">U - Export</text>

  <!-- Slot 8 -->
  <rect x="820" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="860" y="160" font-size="32" text-anchor="middle" fill="#fff">🔔</text>
  <text x="860" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">I - Alerts</text>

  <!-- Slot 9 -->
  <rect x="920" y="100" width="80" height="80" fill="#5a5a5a" stroke="#8a8a8a" stroke-width="2" rx="4"/>
  <text x="960" y="160" font-size="32" text-anchor="middle" fill="#fff">❌</text>
  <text x="960" y="190" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">P - Close</text>

  <!-- Status Bar -->
  <rect x="100" y="220" width="1000" height="50" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="2" rx="6"/>
  <text x="120" y="250" font-size="11" fill="#333" font-weight="bold">Current Selection: ⚙️ Settings (R)</text>
  <text x="950" y="250" font-size="10" fill="#999" text-anchor="end">Press key or click slot to select</text>

  <!-- Details Section -->
  <rect x="100" y="290" width="480" height="280" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="2" rx="8"/>
  <text x="120" y="315" font-size="12" font-weight="bold" fill="#333">Hotbar Slot Details</text>

  <!-- Slot Details: Settings -->
  <rect x="120" y="340" width="440" height="210" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="4"/>
  <text x="130" y="360" font-size="11" fill="#333"><tspan font-weight="bold">⚙️ Settings (R)</tspan></text>
  <text x="130" y="380" font-size="10" fill="#666">Opens the customization panel to adjust response formats, tone,</text>
  <text x="130" y="395" font-size="10" fill="#666">privacy settings, and other preferences.</text>

  <text x="130" y="420" font-size="10" fill="#333"><tspan font-weight="bold">Quick Actions:</tspan></text>
  <text x="140" y="438" font-size="9" fill="#666">• Change response format (Normal/Concise/Detailed)</text>
  <text x="140" y="453" font-size="9" fill="#666">• Toggle code examples and explanations</text>
  <text x="140" y="468" font-size="9" fill="#666">• Set communication tone (Professional/Casual)</text>
  <text x="140" y="483" font-size="9" fill="#666">• Configure data retention and privacy options</text>
  <text x="140" y="498" font-size="9" fill="#666">• Save personal preferences and defaults</text>

  <text x="130" y="520" font-size="10" fill="#999">💡 Pro tip: Customize these settings once and they'll persist</text>
  <text x="130" y="535" font-size="10" fill="#999">across all your sessions.</text>

  <!-- Feature Panel -->
  <rect x="600" y="290" width="500" height="280" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="2" rx="8"/>
  <text x="620" y="315" font-size="12" font-weight="bold" fill="#333">Available Hotbar Features</text>

  <!-- Feature list -->
  <rect x="620" y="340" width="460" height="60" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="630" y="358" font-size="10" fill="#333"><tspan font-weight="bold">💬 Chat (Q)</tspan> - Focus on chat input field</text>
  <text x="630" y="375" font-size="10" fill="#333"><tspan font-weight="bold">📎 Files (W)</tspan> - Open file upload dialog</text>
  <text x="630" y="392" font-size="10" fill="#333"><tspan font-weight="bold">📋 Templates (E)</tspan> - Browse template library</text>

  <rect x="620" y="410" width="460" height="60" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="630" y="428" font-size="10" fill="#333"><tspan font-weight="bold">⚙️ Settings (R)</tspan> - Open customization panel</text>
  <text x="630" y="445" font-size="10" fill="#333"><tspan font-weight="bold">🎨 Theme (T)</tspan> - Switch between light/dark/custom themes</text>
  <text x="630" y="462" font-size="10" fill="#333"><tspan font-weight="bold">🔦 Light (Y)</tspan> - Toggle dark mode on/off</text>

  <rect x="620" y="480" width="460" height="75" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="630" y="498" font-size="10" fill="#333"><tspan font-weight="bold">💾 Export (U)</tspan> - Save session or chat as file</text>
  <text x="630" y="515" font-size="10" fill="#333"><tspan font-weight="bold">🔔 Alerts (I)</tspan> - Show notification settings</text>
  <text x="630" y="532" font-size="10" fill="#333"><tspan font-weight="bold">❌ Close (P)</tspan> - Close current session</text>
  <text x="630" y="549" font-size="10" fill="#999">⚠️ Closing will archive the session for later access</text>

  <!-- Keyboard Shortcut Info -->
  <rect x="100" y="590" width="1000" height="0" fill="none"/>
</svg>
