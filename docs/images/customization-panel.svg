<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">Customization Panel</text>

  <!-- Main Panel -->
  <rect x="30" y="60" width="940" height="720" fill="#fff" stroke="#2c3e50" stroke-width="2" rx="8"/>

  <!-- Header -->
  <rect x="50" y="75" width="900" height="50" fill="#f0f8ff" stroke="#3498db" stroke-width="1" rx="4"/>
  <text x="70" y="102" font-size="14" font-weight="bold" fill="#2980b9">Customization Settings</text>

  <!-- Section 1: Response Format -->
  <rect x="50" y="145" width="900" height="110" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="170" font-size="12" font-weight="bold" fill="#333">Response Format</text>
  <line x1="70" y1="180" x2="930" y2="180" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="205" font-size="11" fill="#333">Response Type:</text>
  <circle cx="280" cy="203" r="5" fill="#3498db"/>
  <text x="295" y="208" font-size="11" fill="#333">Normal</text>
  <circle cx="380" cy="203" r="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="395" y="208" font-size="11" fill="#333">Concise</text>
  <circle cx="480" cy="203" r="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="495" y="208" font-size="11" fill="#333">Detailed</text>

  <text x="70" y="235" font-size="11" fill="#333">Include Code Examples:</text>
  <rect x="270" y="223" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="280" cy="233" r="7" fill="#fff"/>
  <text x="320" y="233" font-size="10" fill="#666">Enabled</text>

  <!-- Section 2: Response Tone -->
  <rect x="50" y="275" width="900" height="110" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="300" font-size="12" font-weight="bold" fill="#333">Communication Tone</text>
  <line x1="70" y1="310" x2="930" y2="310" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="335" font-size="11" fill="#333">Tone:</text>
  <rect x="240" y="323" width="150" height="28" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="343" font-size="11" fill="#333">Professional</text>

  <text x="70" y="365" font-size="11" fill="#333">Formality Level:</text>
  <rect x="70" y="373" width="180" height="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <rect x="70" y="373" width="135" height="8" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="4"/>
  <text x="260" y="380" font-size="10" fill="#666">Balanced (75%)</text>

  <!-- Section 3: Content Preferences -->
  <rect x="50" y="405" width="900" height="130" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="430" font-size="12" font-weight="bold" fill="#333">Content Preferences</text>
  <line x1="70" y1="440" x2="930" y2="440" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="465" font-size="11" fill="#333">Include Disclaimers:</text>
  <rect x="240" y="453" width="40" height="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="10"/>
  <circle cx="250" cy="463" r="7" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="290" y="465" font-size="10" fill="#666">Disabled</text>

  <text x="550" y="465" font-size="11" fill="#333">Highlight Key Points:</text>
  <rect x="720" y="453" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="730" cy="463" r="7" fill="#fff"/>
  <text x="770" y="465" font-size="10" fill="#666">Enabled</text>

  <text x="70" y="495" font-size="11" fill="#333">Language:</text>
  <rect x="240" y="483" width="150" height="28" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="503" font-size="11" fill="#333">English</text>

  <!-- Section 4: Performance -->
  <rect x="50" y="555" width="900" height="110" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="580" font-size="12" font-weight="bold" fill="#333">Performance and Privacy</text>
  <line x1="70" y1="590" x2="930" y2="590" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="615" font-size="11" fill="#333">Auto-save Responses:</text>
  <rect x="240" y="603" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="250" cy="613" r="7" fill="#fff"/>
  <text x="290" y="615" font-size="10" fill="#666">Enabled</text>

  <text x="550" y="615" font-size="11" fill="#333">Data Retention:</text>
  <rect x="720" y="603" width="150" height="28" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="730" y="623" font-size="11" fill="#333">30 days</text>

  <!-- Buttons -->
  <rect x="50" y="685" width="900" height="35" fill="#f0f0f0" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <rect x="700" y="690" width="100" height="25" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="3"/>
  <text x="750" y="708" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">Save</text>
  <rect x="820" y="690" width="100" height="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="870" y="708" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">Reset</text>
</svg>
