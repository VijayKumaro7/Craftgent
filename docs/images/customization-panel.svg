<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">Customization Panel - Personalize Your Experience</text>

  <!-- Main Panel -->
  <rect x="30" y="60" width="940" height="720" fill="#fff" stroke="#2c3e50" stroke-width="2" rx="8"/>

  <!-- Header -->
  <rect x="50" y="75" width="900" height="50" fill="#f0f8ff" stroke="#3498db" stroke-width="1" rx="4"/>
  <text x="70" y="102" font-size="14" font-weight="bold" fill="#2980b9">⚙️ Customization Settings</text>
  <text x="850" y="102" font-size="12" fill="#999" text-anchor="end">Click ⚙️ icon in toolbar to access</text>

  <!-- Section 1: Response Format -->
  <rect x="50" y="145" width="900" height="120" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="170" font-size="12" font-weight="bold" fill="#333">📝 Response Format</text>
  <line x1="70" y1="180" x2="930" y2="180" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="205" font-size="11" fill="#333">Response Type:</text>
  <circle cx="280" cy="203" r="5" fill="#3498db"/>
  <text x="295" y="208" font-size="11" fill="#333">Normal</text>
  <circle cx="380" cy="203" r="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="395" y="208" font-size="11" fill="#333">Concise</text>
  <circle cx="480" cy="203" r="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="495" y="208" font-size="11" fill="#333">Detailed</text>
  <circle cx="600" cy="203" r="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="615" y="208" font-size="11" fill="#333">Step-by-Step</text>

  <text x="70" y="235" font-size="11" fill="#333">Include Code Examples:</text>
  <rect x="270" y="223" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="280" cy="233" r="7" fill="#fff"/>
  <text x="320" y="233" font-size="10" fill="#666">Enabled</text>

  <text x="550" y="235" font-size="11" fill="#333">Include Explanations:</text>
  <rect x="720" y="223" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="730" cy="233" r="7" fill="#fff"/>
  <text x="770" y="233" font-size="10" fill="#666">Enabled</text>

  <!-- Section 2: Response Tone & Style -->
  <rect x="50" y="285" width="900" height="120" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="310" font-size="12" font-weight="bold" fill="#333">🎭 Tone & Communication Style</text>
  <line x1="70" y1="320" x2="930" y2="320" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="345" font-size="11" fill="#333">Communication Tone:</text>
  <select-like>
    <rect x="240" y="333" width="150" height="28" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="250" y="353" font-size="11" fill="#333">Professional ▼</text>
  </select-like>

  <text x="70" y="375" font-size="11" fill="#333">Formality Level:</text>
  <rect x="70" y="383" width="180" height="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <rect x="70" y="383" width="135" height="8" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="4"/>
  <text x="260" y="390" font-size="10" fill="#666">Balanced (75%)</text>

  <!-- Section 3: Content Preferences -->
  <rect x="50" y="425" width="900" height="150" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="450" font-size="12" font-weight="bold" fill="#333">🎯 Content Preferences</text>
  <line x1="70" y1="460" x2="930" y2="460" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="485" font-size="11" fill="#333">Include Disclaimers:</text>
  <rect x="240" y="473" width="40" height="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="10"/>
  <circle cx="250" cy="483" r="7" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="290" y="485" font-size="10" fill="#666">Disabled</text>

  <text x="550" y="485" font-size="11" fill="#333">Highlight Key Points:</text>
  <rect x="720" y="473" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="730" cy="483" r="7" fill="#fff"/>
  <text x="770" y="485" font-size="10" fill="#666">Enabled</text>

  <text x="70" y="515" font-size="11" fill="#333">Response Language:</text>
  <rect x="240" y="503" width="150" height="28" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="523" font-size="11" fill="#333">English ▼</text>

  <text x="550" y="515" font-size="11" fill="#333">Code Syntax Highlighting:</text>
  <rect x="720" y="503" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="730" cy="513" r="7" fill="#fff"/>
  <text x="770" y="515" font-size="10" fill="#666">Enabled</text>

  <!-- Section 4: Performance & Privacy -->
  <rect x="50" y="595" width="900" height="130" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="70" y="620" font-size="12" font-weight="bold" fill="#333">⚡ Performance & Privacy</text>
  <line x1="70" y1="630" x2="930" y2="630" stroke="#bdc3c7" stroke-width="1"/>

  <text x="70" y="655" font-size="11" fill="#333">Auto-save Responses:</text>
  <rect x="240" y="643" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="250" cy="653" r="7" fill="#fff"/>
  <text x="290" y="655" font-size="10" fill="#666">Enabled</text>

  <text x="550" y="655" font-size="11" fill="#333">Load Rich Formatting:</text>
  <rect x="720" y="643" width="40" height="20" fill="#27ae60" stroke="#229954" stroke-width="1" rx="10"/>
  <circle cx="730" cy="653" r="7" fill="#fff"/>
  <text x="770" y="655" font-size="10" fill="#666">Enabled</text>

  <text x="70" y="685" font-size="11" fill="#333">Data Retention:</text>
  <rect x="240" y="673" width="150" height="28" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="693" font-size="11" fill="#333">30 days ▼</text>

  <text x="550" y="685" font-size="11" fill="#333">Analytics Tracking:</text>
  <rect x="720" y="673" width="40" height="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="10"/>
  <circle cx="730" cy="683" r="7" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="770" y="685" font-size="10" fill="#666">Disabled</text>

  <!-- Buttons at Bottom -->
  <rect x="50" y="745" width="900" height="35" fill="#f0f0f0" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <rect x="700" y="750" width="100" height="25" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="3"/>
  <text x="750" y="768" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">Save Changes</text>
  <rect x="820" y="750" width="100" height="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="870" y="768" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">Reset to Default</text>

  <!-- Info Box -->
  <rect x="30" y="0" width="940" height="0" fill="none"/>
</svg>
