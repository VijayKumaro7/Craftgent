<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">Session Management - Organize Your Conversations</text>

  <!-- Top Section: Session Tabs -->
  <rect x="30" y="60" width="1140" height="80" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="2" rx="8"/>
  <text x="40" y="85" font-size="12" font-weight="bold" fill="#333">Session Tabs - Multiple Conversations</text>

  <!-- Tab 1 -->
  <rect x="50" y="105" width="150" height="35" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/>
  <text x="70" y="125" font-size="11" fill="#fff" font-weight="bold">📌 Debug Python</text>
  <text x="125" y="125" font-size="14" fill="#fff" font-weight="bold">×</text>

  <!-- Tab 2 -->
  <rect x="220" y="105" width="150" height="35" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="240" y="125" font-size="11" fill="#333" font-weight="bold">📊 Data Analysis</text>
  <text x="295" y="125" font-size="14" fill="#999">×</text>

  <!-- Tab 3 -->
  <rect x="390" y="105" width="150" height="35" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="410" y="125" font-size="11" fill="#333" font-weight="bold">📝 Documentation</text>
  <text x="465" y="125" font-size="14" fill="#999">×</text>

  <!-- Tab 4 -->
  <rect x="560" y="105" width="150" height="35" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="580" y="125" font-size="11" fill="#333" font-weight="bold">🔧 API Design</text>
  <text x="635" y="125" font-size="14" fill="#999">×</text>

  <!-- New Session Button -->
  <rect x="730" y="105" width="350" height="35" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" rx="4"/>
  <text x="750" y="125" font-size="11" fill="#229954" font-weight="bold">➕ New Session</text>
  <text x="1050" y="125" font-size="11" fill="#666">Or press Ctrl+N</text>

  <!-- Left: Session History -->
  <rect x="30" y="160" width="300" height="520" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="2" rx="8"/>
  <text x="40" y="185" font-size="12" font-weight="bold" fill="#333">Session History</text>
  <line x1="40" y1="195" x2="310" y2="195" stroke="#bdc3c7" stroke-width="1"/>

  <!-- Expandable sections -->
  <text x="40" y="220" font-size="11" fill="#666">📅 <tspan font-weight="bold">Today</tspan></text>

  <rect x="50" y="235" width="270" height="35" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="60" y="255" font-size="10" fill="#333" font-weight="bold">Debug Python Code</text>
  <text x="60" y="267" font-size="8" fill="#999">2:30 PM • 45 messages</text>

  <rect x="50" y="280" width="270" height="35" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="60" y="300" font-size="10" fill="#333" font-weight="bold">Data Analysis Discussion</text>
  <text x="60" y="312" font-size="8" fill="#999">1:15 PM • 23 messages</text>

  <text x="40" y="345" font-size="11" fill="#666">📅 <tspan font-weight="bold">Yesterday</tspan></text>

  <rect x="50" y="360" width="270" height="35" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="60" y="380" font-size="10" fill="#333" font-weight="bold">API Documentation</text>
  <text x="60" y="392" font-size="8" fill="#999">3:45 PM • 67 messages</text>

  <rect x="50" y="405" width="270" height="35" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="60" y="425" font-size="10" fill="#333" font-weight="bold">React Optimization</text>
  <text x="60" y="437" font-size="8" fill="#999">10:20 AM • 34 messages</text>

  <text x="40" y="470" font-size="11" fill="#666">📅 <tspan font-weight="bold">Last Week</tspan></text>

  <rect x="50" y="485" width="270" height="35" fill="#fff" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  <text x="60" y="505" font-size="10" fill="#333" font-weight="bold">Database Schema Design</text>
  <text x="60" y="517" font-size="8" fill="#999">Monday • 89 messages</text>

  <!-- Right: Session Details -->
  <rect x="350" y="160" width="800" height="520" fill="#fff" stroke="#2c3e50" stroke-width="2" rx="8"/>

  <!-- Session Info Header -->
  <rect x="370" y="175" width="760" height="60" fill="#f0f8ff" stroke="#3498db" stroke-width="1" rx="4"/>
  <text x="380" y="197" font-size="13" font-weight="bold" fill="#2980b9">📌 Debug Python Code</text>
  <text x="380" y="218" font-size="10" fill="#666">Started: Today at 2:30 PM • 45 messages • With: ALEX & NEXUS agents</text>
  <rect x="1070" y="187" width="75" height="28" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="3"/>
  <text x="1107" y="207" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">Resume</text>

  <!-- Quick Stats -->
  <rect x="370" y="250" width="180" height="80" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="460" y="270" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Messages</text>
  <text x="460" y="295" font-size="24" text-anchor="middle" fill="#3498db" font-weight="bold">45</text>
  <text x="460" y="315" font-size="9" text-anchor="middle" fill="#666">conversation turns</text>

  <rect x="570" y="250" width="180" height="80" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="660" y="270" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Duration</text>
  <text x="660" y="295" font-size="24" text-anchor="middle" fill="#f39c12" font-weight="bold">25m</text>
  <text x="660" y="315" font-size="9" text-anchor="middle" fill="#666">active session</text>

  <rect x="770" y="250" width="180" height="80" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="860" y="270" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Agents Used</text>
  <text x="860" y="295" font-size="24" text-anchor="middle" fill="#27ae60" font-weight="bold">2</text>
  <text x="860" y="315" font-size="9" text-anchor="middle" fill="#666">ALEX & NEXUS</text>

  <!-- Recent Messages Preview -->
  <text x="380" y="360" font-size="11" font-weight="bold" fill="#333">Recent Messages in This Session:</text>

  <rect x="370" y="375" width="760" height="290" fill="#f9f9f9" stroke="#ecf0f1" stroke-width="1" rx="4" overflow="hidden"/>

  <text x="380" y="397" font-size="10" fill="#333"><tspan font-weight="bold">You (2:47 PM):</tspan></text>
  <text x="380" y="413" font-size="9" fill="#666">Can you refactor this Python function to be more efficient?</text>

  <text x="380" y="438" font-size="10" fill="#f39c12"><tspan font-weight="bold">ALEX (2:48 PM):</tspan></text>
  <text x="380" y="454" font-size="9" fill="#666">I can help with that. The current implementation uses nested loops which</text>
  <text x="380" y="467" font-size="9" fill="#666">has O(n²) complexity. Here's a more efficient approach...</text>

  <text x="380" y="492" font-size="10" fill="#9b59b6"><tspan font-weight="bold">NEXUS (2:50 PM):</tspan></text>
  <text x="380" y="508" font-size="9" fill="#666">I'd recommend also considering caching results if you call this</text>
  <text x="380" y="521" font-size="9" fill="#666">function frequently. This could provide additional performance gains.</text>

  <text x="380" y="546" font-size="10" fill="#333"><tspan font-weight="bold">You (2:51 PM):</tspan></text>
  <text x="380" y="562" font-size="9" fill="#666">Great suggestions! Let me implement the caching approach and test it.</text>

  <text x="380" y="587" font-size="10" fill="#27ae60"><tspan font-weight="bold">Session Control:</tspan></text>
  <rect x="380" y="600" width="100" height="28" fill="#3498db" stroke="#2980b9" stroke-width="1" rx="3"/>
  <text x="430" y="619" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">Continue</text>

  <rect x="495" y="600" width="100" height="28" fill="#e74c3c" stroke="#c0392b" stroke-width="1" rx="3"/>
  <text x="545" y="619" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">Archive</text>

  <rect x="610" y="600" width="100" height="28" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="660" y="619" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">Export</text>

  <!-- Bottom info section -->
  <rect x="30" y="700" width="1140" height="0" fill="none"/>
</svg>
