<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">Authentication Flow - Login & Registration</text>

  <!-- Step 1: Login Screen -->
  <g>
    <rect x="50" y="80" width="280" height="400" fill="#fff" stroke="#3498db" stroke-width="2" rx="8"/>
    <text x="190" y="120" font-size="16" font-weight="bold" text-anchor="middle" fill="#2980b9">Login</text>
    <line x1="70" y1="135" x2="310" y2="135" stroke="#3498db" stroke-width="1"/>

    <text x="70" y="165" font-size="12" fill="#333" font-weight="bold">Email Address</text>
    <rect x="70" y="175" width="220" height="35" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="80" y="200" font-size="12" fill="#999">user@example.com</text>

    <text x="70" y="240" font-size="12" fill="#333" font-weight="bold">Password</text>
    <rect x="70" y="250" width="220" height="35" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="80" y="275" font-size="12" fill="#999">••••••••</text>

    <rect x="70" y="310" width="220" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/>
    <text x="180" y="337" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">Login</text>

    <text x="180" y="375" font-size="11" text-anchor="middle" fill="#3498db" text-decoration="underline">Forgot password?</text>
  </g>

  <!-- Arrow -->
  <path d="M 350 280 L 400 280" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowgreen)"/>
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Step 2: Registration Option -->
  <g>
    <rect x="420" y="80" width="280" height="400" fill="#fff" stroke="#27ae60" stroke-width="2" rx="8"/>
    <text x="560" y="120" font-size="16" font-weight="bold" text-anchor="middle" fill="#229954">Sign Up</text>
    <line x1="440" y1="135" x2="680" y2="135" stroke="#27ae60" stroke-width="1"/>

    <text x="440" y="165" font-size="12" fill="#333" font-weight="bold">Full Name</text>
    <rect x="440" y="175" width="220" height="35" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="450" y="200" font-size="12" fill="#999">John Doe</text>

    <text x="440" y="240" font-size="12" fill="#333" font-weight="bold">Email Address</text>
    <rect x="440" y="250" width="220" height="35" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="450" y="275" font-size="12" fill="#999">user@example.com</text>

    <text x="440" y="320" font-size="12" fill="#333" font-weight="bold">Password</text>
    <rect x="440" y="330" width="220" height="35" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="450" y="355" font-size="12" fill="#999">••••••••</text>

    <rect x="440" y="380" width="220" height="40" fill="#27ae60" stroke="#229954" stroke-width="2" rx="4"/>
    <text x="550" y="407" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">Create Account</text>
  </g>

  <!-- Arrow -->
  <path d="M 720 280 L 770 280" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrowred)"/>
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Step 3: Successful Login -->
  <g>
    <rect x="790" y="80" width="160" height="400" fill="#d5f4e6" stroke="#27ae60" stroke-width="2" rx="8"/>
    <text x="870" y="120" font-size="14" font-weight="bold" text-anchor="middle" fill="#229954">Success! ✓</text>
    <line x1="810" y1="135" x2="930" y2="135" stroke="#27ae60" stroke-width="1"/>

    <text x="870" y="200" font-size="12" text-anchor="middle" fill="#333">Logged in as:</text>
    <text x="870" y="225" font-size="11" text-anchor="middle" fill="#229954" font-weight="bold">user@example.com</text>

    <text x="870" y="280" font-size="11" text-anchor="middle" fill="#555">Redirecting to</text>
    <text x="870" y="298" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Main Chat Interface...</text>

    <circle cx="870" cy="360" r="20" fill="none" stroke="#27ae60" stroke-width="2"/>
    <circle cx="870" cy="360" r="15" fill="none" stroke="#27ae60" stroke-width="1"/>
    <text x="870" y="367" font-size="20" text-anchor="middle" fill="#27ae60" font-weight="bold">→</text>
  </g>

  <!-- Bottom Info -->
  <rect x="50" y="520" width="900" height="150" fill="#f0f8ff" stroke="#3498db" stroke-width="1" rx="4"/>
  <text x="60" y="545" font-size="12" font-weight="bold" fill="#2980b9">Key Features:</text>
  <text x="60" y="567" font-size="11" fill="#333">✓ Secure JWT authentication with encrypted passwords (bcrypt)</text>
  <text x="60" y="587" font-size="11" fill="#333">✓ Email verification for new accounts</text>
  <text x="60" y="607" font-size="11" fill="#333">✓ Password reset functionality via email</text>
  <text x="60" y="627" font-size="11" fill="#333">✓ Session persistence - stay logged in across page reloads</text>
  <text x="60" y="647" font-size="11" fill="#333">✓ CSRF protection and secure token storage</text>
</svg>
