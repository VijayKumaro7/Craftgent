version: "3.9"

# ── Production Docker Compose ─────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (set via Railway/Render secrets or .env.prod):
#   ANTHROPIC_API_KEY, SECRET_KEY, DATABASE_URL, REDIS_URL
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   TAVILY_API_KEY (optional)

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  CHROMA_HOST: chromadb
  CHROMA_PORT: 8001
  APP_ENV: production
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  SECRET_KEY: ${SECRET_KEY}
  TAVILY_API_KEY: ${TAVILY_API_KEY:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally in production
    networks: [internal]

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-craftgent_redis}
        --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-craftgent_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── ChromaDB ──────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.6.3
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── FastAPI (production build) ────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      <<: *common-env
    depends_on:
      db:       { condition: service_healthy }
      redis:    { condition: service_healthy }
      chromadb: { condition: service_healthy }
    # Run migrations on startup before serving
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app
               --host 0.0.0.0 --port 8000
               --workers 4 --no-access-log
               --proxy-headers --forwarded-allow-ips '*'"
    networks: [internal]

  # ── Celery worker ─────────────────────────────────────────────────────
  worker:
    build:
      context:    ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      <<: *common-env
    depends_on:
      db:       { condition: service_healthy }
      redis:    { condition: service_healthy }
      chromadb: { condition: service_healthy }
    command: >
      celery -A app.tasks.celery_app worker
        --loglevel=info
        --queues=agents
        --concurrency=4
        --max-tasks-per-child=50
    networks: [internal]

  # ── Nginx (frontend + reverse proxy) ──────────────────────────────────
  web:
    build:
      context:    ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL:  ${VITE_WS_URL:-}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/craftgent.conf:/etc/nginx/conf.d/craftgent.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on: [api]
    networks: [internal, external]

  # ── Certbot — auto-renews TLS certificates ────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew every 12 hours; certbot only acts when cert is within 30 days of expiry
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    networks: [external]

networks:
  internal:
    driver: bridge
    internal: true   # no direct internet access for backend services
  external:
    driver: bridge   # only Nginx faces the internet

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  certbot_www:
  certbot_certs:
